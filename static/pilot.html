<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solvulator Pilot – Live Pipeline</title>
<link rel="stylesheet" href="/shared.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
  body{font-family:var(--sans);display:flex;min-height:100vh}
  pre{white-space:pre-wrap;word-break:break-word;font-family:'JetBrains Mono',var(--mono)}
  code,.mono{font-family:'JetBrains Mono',var(--mono)}

  /* ── layout ── */
  .sidebar{width:288px;background:var(--s1);display:flex;flex-direction:column;
    height:100vh;overflow:hidden;border-left:1px solid var(--border)}
  .sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
  .sidebar-body{flex:1;overflow-y:auto;padding:12px}
  .sidebar-footer{padding:12px;border-top:1px solid var(--border);font-size:12px;color:var(--dim)}
  .main{flex:1;padding:24px;overflow:auto}

  /* ── nav pills ── */
  .nav-pills{display:flex;gap:8px;margin-top:8px;font-size:12px}
  .nav-pill{padding:4px 8px;border-radius:6px;background:var(--s2);color:var(--mid);
    text-decoration:none;transition:background .15s}
  .nav-pill:hover{background:var(--s3);color:var(--text);text-decoration:none}
  .nav-pill.active{background:rgba(74,143,232,0.15);color:var(--blue)}

  /* ── doc library ── */
  .doc-lib-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .doc-lib-header h2{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:1.5px;
    font-family:'JetBrains Mono',var(--mono)}
  .upload-btn{font-size:10px;background:rgba(74,143,232,0.12);color:var(--blue);
    padding:3px 8px;border-radius:4px;cursor:pointer;min-height:24px}
  .upload-btn:hover{background:rgba(74,143,232,0.2)}
  .upload-btn input{display:none}
  .doc-item{display:flex;align-items:start;gap:8px;padding:8px;border-radius:8px;
    cursor:pointer;transition:all .15s;border:1px solid transparent}
  .doc-item:hover{background:var(--s2);border-color:var(--border)}
  .doc-item+.doc-item{margin-top:4px}

  /* ── viewer panel ── */
  .viewer-panel{border-top:1px solid var(--border);background:var(--bg);
    max-height:40vh;overflow-y:auto;display:none}
  .viewer-panel.open{display:block}
  .viewer-header{display:flex;justify-content:space-between;align-items:center;
    padding:12px;position:sticky;top:0;background:var(--bg);z-index:10}
  .viewer-header h3{font-size:12px;font-weight:700;color:var(--mid);overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap}
  .viewer-actions{display:flex;gap:6px}
  .viewer-actions button{font-size:10px;padding:3px 8px;border-radius:4px;min-height:24px}
  .btn-analyze{background:rgba(61,184,122,0.12);color:var(--green)}
  .btn-open{background:var(--s3);color:var(--mid)}
  .btn-close{color:var(--dim);min-height:24px;padding:3px 4px}

  /* ── top bar ── */
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .top-bar h2{font-size:20px;font-weight:600}
  .top-controls{display:flex;gap:8px;align-items:center}
  .top-controls select{background:var(--s2);color:var(--text);font-size:13px;
    border-radius:8px;padding:8px 12px;border:1px solid var(--border);outline:none}
  .top-controls select:focus{border-color:var(--blue)}
  .btn-start{background:var(--blue);color:#fff;padding:8px 20px;border-radius:12px;font-size:13px;
    transition:background .15s}
  .btn-start:hover{background:#5a9af8}
  .btn-step{background:var(--green);color:#fff;padding:8px 16px;border-radius:12px;font-size:13px;
    display:none;transition:background .15s}
  .btn-step:hover{background:#4dc88a}
  .btn-approve{background:var(--orange);color:#fff;padding:8px 16px;border-radius:12px;font-size:13px;
    display:none;transition:background .15s}
  .btn-approve:hover{background:#e8904a}

  /* ── document input panel ── */
  .doc-panel{backdrop-filter:blur(12px);background:rgba(255,255,255,.05);
    padding:16px;border-radius:16px;margin-bottom:16px;border:1px solid var(--border);
    position:relative;overflow:hidden}
  .doc-input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);
    border-radius:8px;padding:8px;color:var(--text);font-size:12px;resize:vertical;
    min-height:80px;font-family:inherit;outline:none}
  .doc-input:focus{border-color:var(--blue)}
  .doc-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .upload-label{background:var(--s2);font-size:12px;padding:6px 12px;border-radius:8px;
    cursor:pointer;color:var(--mid);transition:background .15s}
  .upload-label:hover{background:var(--s3)}
  .upload-label input{display:none}

  /* ── scanner overlay ── */
  @keyframes scanSweep{
    0%{top:-100%}
    100%{top:200%}
  }
  .scanner-overlay{position:absolute;inset:0;pointer-events:none;overflow:hidden;opacity:0;transition:opacity .3s}
  .scanner-overlay.active{opacity:1}
  .scanner-line{position:absolute;left:0;right:0;height:60px;
    background:linear-gradient(180deg,transparent,rgba(74,143,232,0.15),rgba(74,143,232,0.08),transparent);
    animation:scanSweep 2s linear infinite}

  /* ── pipeline cards ── */
  .pipeline-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:16px;margin-bottom:16px}
  .agent-card{min-width:170px;backdrop-filter:blur(12px);background:rgba(255,255,255,.05);
    padding:12px;border-radius:12px;border:1px solid var(--border);opacity:0.4;
    cursor:pointer;transition:all .25s;position:relative}
  .agent-card.state-running{opacity:1;border-color:var(--blue);border-left:3px solid var(--blue)}
  .agent-card.state-done{opacity:1;border-color:var(--green);border-left:3px solid var(--green)}
  .agent-card.state-gate{opacity:1;border-color:var(--orange);border-left:3px solid var(--orange)}
  .agent-card.state-error{opacity:1;border-color:var(--red);border-left:3px solid var(--red)}
  .agent-card.state-running,.agent-card.state-done,.agent-card.state-gate,.agent-card.state-error{opacity:1}
  .agent-label{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:4px}
  .agent-name{font-weight:700;font-size:13px;margin-top:4px;color:var(--text)}
  .agent-status{margin-top:8px;font-size:12px;color:var(--dim)}
  .agent-progress{width:100%;height:3px;background:var(--s3);border-radius:2px;margin-top:6px;display:none}
  .agent-progress-bar{height:100%;background:var(--blue);border-radius:2px;transition:width .3s}
  .gate-badge{display:inline-block;background:rgba(224,128,58,0.2);color:var(--orange);
    font-size:10px;padding:1px 6px;border-radius:4px}
  .pipeline-arrow{align-self:center;color:var(--border);font-size:12px}

  /* ── status lights ── */
  .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:6px}
  .status-dot.off{background:var(--dim)}
  .status-dot.active{background:var(--blue);box-shadow:0 0 6px var(--blue);animation:pulse 1.5s ease infinite}
  .status-dot.done{background:var(--green);box-shadow:0 0 6px var(--green)}
  .status-dot.error{background:var(--red);box-shadow:0 0 6px var(--red)}
  .status-dot.gate{background:var(--orange);box-shadow:0 0 6px var(--orange)}

  /* ── inspector ── */
  .inspector-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px}
  .inspector-panel{backdrop-filter:blur(12px);background:rgba(255,255,255,.05);
    padding:16px;border-radius:16px;border:1px solid var(--border)}
  .inspector-panel h3{font-weight:700;margin-bottom:8px}
  .inspector-pre{font-size:12px;background:rgba(0,0,0,.4);padding:12px;border-radius:8px;
    max-height:400px;overflow:auto;color:var(--mid);font-family:'JetBrains Mono',var(--mono)}
  .inspector-meta{font-size:12px;color:var(--dim);font-family:'JetBrains Mono',var(--mono)}

  /* ── run status panel ── */
  .run-status{font-size:13px;color:var(--mid)}
  .run-status>div{margin-bottom:8px}

  /* ── total exposure result ── */
  .result-panel{margin-top:12px;padding:12px;border-radius:8px;background:var(--s2);
    border:1px solid var(--border);display:none}
  .result-panel.visible{display:block}
  .result-label{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',var(--mono);
    letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
  .result-value{font-size:18px;font-weight:700;color:var(--gold);
    font-family:'JetBrains Mono',var(--mono)}

  /* ── resume banner ── */
  .resume-banner{display:none;padding:10px 16px;background:rgba(74,143,232,0.1);
    border:1px solid rgba(74,143,232,0.3);border-radius:8px;margin-bottom:16px;
    font-size:13px;color:var(--blue);align-items:center;gap:12px}
  .resume-banner.visible{display:flex}
  .resume-banner button{background:var(--blue);color:#fff;padding:6px 14px;
    border-radius:6px;font-size:12px;min-height:32px}
  .resume-banner .dismiss{background:none;color:var(--dim);min-height:32px;font-size:12px}

  /* ── health status ── */
  .health-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-left:4px}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-header">
    <h1 style="font-size:18px;font-weight:700">Solvulator</h1>
    <div class="nav-pills">
      <a href="/" class="nav-pill">Storyboard</a>
      <span class="nav-pill active">Pipeline</span>
      <a href="/check.html" class="nav-pill">Check</a>
    </div>
  </div>

  <!-- Document Library -->
  <div class="sidebar-body">
    <div class="doc-lib-header">
      <h2>DOCUMENTS</h2>
      <label class="upload-btn">
        + Upload
        <input type="file" accept=".pdf,.txt,.doc,.docx,.jpg,.png" onchange="handleFileUpload(this)"/>
      </label>
    </div>
    <div id="doc-library">
      <div style="font-size:12px;color:var(--dim);padding:8px">Loading...</div>
    </div>
  </div>

  <!-- Viewer panel -->
  <div id="doc-viewer" class="viewer-panel">
    <div class="viewer-header">
      <h3 id="viewer-title"></h3>
      <div class="viewer-actions">
        <button class="btn-analyze" onclick="analyzeViewedDoc()">Analyze</button>
        <button class="btn-open" onclick="openDocNewTab()">Open</button>
        <button class="btn-close" onclick="closeViewer()">x</button>
      </div>
    </div>
    <div id="viewer-content" style="padding:0 12px 12px"></div>
  </div>

  <div class="sidebar-footer">
    <div id="health-status">Checking...</div>
  </div>
</aside>

<main class="main">
  <!-- Resume banner -->
  <div id="resume-banner" class="resume-banner">
    <span id="resume-text"></span>
    <button onclick="resumeRun()">Resume</button>
    <button class="dismiss" onclick="dismissResume()">Dismiss</button>
  </div>

  <div class="top-bar">
    <h2>Pipeline Runner</h2>
    <div class="top-controls">
      <select id="doc-select">
        <option value="">-- Select document --</option>
      </select>
      <button id="start" class="btn-start">Start Pipeline</button>
      <button id="step" class="btn-step">Next Step</button>
      <button id="approve" class="btn-approve">Approve Gate</button>
    </div>
  </div>

  <!-- Document input -->
  <div id="doc-panel" class="doc-panel">
    <div class="scanner-overlay" id="scanner-overlay"><div class="scanner-line"></div></div>
    <div class="doc-panel-header">
      <h3 style="font-weight:700;font-size:14px">Document Text</h3>
      <label class="upload-label">
        Upload PDF/TXT
        <input type="file" accept=".pdf,.txt,.doc,.docx" onchange="handleFile(this)"/>
      </label>
    </div>
    <textarea id="doc-text" class="doc-input" rows="4" placeholder="Paste document text here, upload a file, or select from dropdown..."></textarea>
  </div>

  <!-- Pipeline cards -->
  <div id="pipeline" class="pipeline-row"></div>

  <!-- Result panel (total exposure) -->
  <div id="result-panel" class="result-panel">
    <div class="result-label">Total Exposure</div>
    <div id="result-value" class="result-value">--</div>
  </div>

  <!-- Inspector -->
  <div class="inspector-grid">
    <div class="inspector-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h3 id="inspector-title">Select an agent</h3>
        <span id="inspector-ms" class="inspector-meta"></span>
      </div>
      <pre id="inspector" class="inspector-pre">Click "Start Pipeline" to begin</pre>
    </div>
    <div class="inspector-panel">
      <h3>Run Status</h3>
      <div id="sys" class="run-status">
        <div>Waiting for input</div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="/shared.js"></script>
<script>
const API = '';
// Fallback agent list; overwritten by /agents fetch on load
let AGENTS = [
  {id:'01_intake',       t:'קליטה וסיווג',             gate:true},
  {id:'02_ocr',          t:'OCR ושלמות טקסט',           gate:true},
  {id:'03_operative',    t:'חילוץ אופרטיבי',            gate:true},
  {id:'04_structure',    t:'מיפוי מבנה משפטי',          gate:false},
  {id:'05_weakness',     t:'גלאי חולשות',               gate:false},
  {id:'06_foi',          t:'טריגר חופש מידע',            gate:false},
  {id:'07_damage',       t:'מחשבון חשיפת נזקים',        gate:false},
  {id:'08_strategy',     t:'בניית אסטרטגיה',            gate:true},
  {id:'09_draft',        t:'יצירת טיוטה',               gate:true},
  {id:'10_verify',       t:'שער אימות אנושי',           gate:true},
  {id:'11_filing',       t:'שליחה ותיעוד',              gate:false},
  {id:'12_meta',         t:'רישום דפוסים מערכתיים',     gate:false},
];

let runId = null;
let runState = null;
let completedSteps = [];
let resumeRunId = null;

// Build pipeline cards
const pipeline = document.getElementById('pipeline');
AGENTS.forEach((a, i) => {
  const c = document.createElement('div');
  c.className = 'agent-card';
  c.id = 'card-' + i;
  c.innerHTML = `
    <div class="agent-label">
      <span class="status-dot off" id="dot-${i}"></span>
      Agent ${String(i+1).padStart(2,'0')}
      ${a.gate ? '<span class="gate-badge">GATE</span>' : ''}
    </div>
    <div class="agent-name">${a.t}</div>
    <div class="agent-status" id="st-${i}">locked</div>
    <div class="agent-progress" id="pg-${i}">
      <div class="agent-progress-bar" id="pgbar-${i}" style="width:0%"></div>
    </div>`;
  c.onclick = () => clickAgent(i);
  pipeline.appendChild(c);
  if (i < AGENTS.length - 1) {
    const arr = document.createElement('div');
    arr.className = 'pipeline-arrow';
    arr.textContent = '\u2192';
    pipeline.appendChild(arr);
  }
});

function setCardState(i, state, pct = 0) {
  const card = document.getElementById('card-' + i);
  const st = document.getElementById('st-' + i);
  const pg = document.getElementById('pg-' + i);
  const pgbar = document.getElementById('pgbar-' + i);
  const dot = document.getElementById('dot-' + i);
  if (!card) return;

  card.className = 'agent-card';
  dot.className = 'status-dot off';

  if (state === 'running') {
    card.classList.add('state-running');
    dot.className = 'status-dot active';
    st.innerHTML = '<span style="color:var(--blue)">running... ' + pct + '%</span>';
    pg.style.display = 'block';
    pgbar.style.width = pct + '%';
  } else if (state === 'done') {
    card.classList.add('state-done');
    dot.className = 'status-dot done';
    st.innerHTML = '<span style="color:var(--green)">done</span>';
    pg.style.display = 'none';
  } else if (state === 'gate') {
    card.classList.add('state-gate');
    dot.className = 'status-dot gate';
    st.innerHTML = '<span style="color:var(--orange)">awaiting approval</span>';
    pg.style.display = 'none';
  } else if (state === 'error') {
    card.classList.add('state-error');
    dot.className = 'status-dot error';
    st.innerHTML = '<span style="color:var(--red)">error</span>';
    pg.style.display = 'none';
  } else {
    st.textContent = 'locked';
    pg.style.display = 'none';
  }
}

function clickAgent(i) {
  if (i >= completedSteps.length) {
    if (!(runState === 'paused_at_gate' && i === completedSteps.length)) return;
  }
  const step = completedSteps[i];
  if (!step) return;
  document.getElementById('inspector-title').textContent = 'Agent ' + String(i+1).padStart(2,'0') + ' \u2013 ' + AGENTS[i].t;
  document.getElementById('inspector-ms').textContent = step.elapsed_ms ? step.elapsed_ms + 'ms' : '';
  document.getElementById('inspector').textContent = JSON.stringify(step.result || step, null, 2);
}

function updateSys() {
  const sys = document.getElementById('sys');
  const parts = [];
  if (runId) parts.push('<div class="mono" style="font-size:11px;color:var(--dim)">' + runId + '</div>');
  parts.push('<div>Steps: ' + completedSteps.length + ' / 12</div>');
  if (runState === 'paused_at_gate') {
    parts.push('<div style="color:var(--orange)">Waiting: human gate approval</div>');
  } else if (runState === 'completed') {
    parts.push('<div style="color:var(--green)">Pipeline complete</div>');
    updateExposure();
  } else if (runState === 'running') {
    parts.push('<div style="color:var(--blue)">Running...</div>');
  }
  sys.innerHTML = parts.join('');
}

function updateExposure() {
  // Try to extract total exposure from damage agent (step 7)
  const dmgStep = completedSteps[6]; // 07_damage
  if (dmgStep && dmgStep.result) {
    const r = dmgStep.result;
    const total = r.total_exposure || r.total || r.amount || null;
    if (total) {
      document.getElementById('result-value').textContent = '\u20AA' + Number(total).toLocaleString();
      document.getElementById('result-panel').classList.add('visible');
    }
  }
}

// ── Scanner overlay effect ──
function setScannerActive(active) {
  const el = document.getElementById('scanner-overlay');
  if (active) el.classList.add('active');
  else el.classList.remove('active');
}

// ── Start pipeline ──
document.getElementById('start').onclick = async () => {
  const docText = document.getElementById('doc-text').value.trim();
  if (!docText) { toast('Enter document text first'); return; }

  completedSteps = [];
  runState = 'starting';
  AGENTS.forEach((_, i) => setCardState(i, 'locked'));
  document.getElementById('inspector').textContent = 'Starting pipeline...';
  document.getElementById('step').style.display = 'none';
  document.getElementById('approve').style.display = 'none';
  document.getElementById('result-panel').classList.remove('visible');
  setScannerActive(true);

  try {
    const resp = await fetch(API + '/pipeline/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({doc_text: docText})
    });
    const data = await resp.json();
    if (data.error) { toast('Error: ' + data.error); setScannerActive(false); return; }
    runId = data.run_id;
    runState = 'pending';
    updateSys();
    toast('Pipeline started: ' + runId);
    await runStep();
  } catch (e) {
    toast('Failed to start: ' + e.message);
    setScannerActive(false);
  }
};

// ── Run next step ──
async function runStep() {
  if (!runId) return;
  const stepIdx = completedSteps.length;
  if (stepIdx >= 12) { runState = 'completed'; setScannerActive(false); updateSys(); return; }

  setCardState(stepIdx, 'running', 10);
  runState = 'running';
  updateSys();
  setScannerActive(true);

  let pct = 10;
  const iv = setInterval(() => {
    pct = Math.min(90, pct + Math.random() * 15);
    setCardState(stepIdx, 'running', Math.round(pct));
  }, 500);

  try {
    const resp = await fetch(API + '/pipeline/' + runId + '/step', {method: 'POST'});
    clearInterval(iv);
    const data = await resp.json();

    if (data.error) {
      setCardState(stepIdx, 'error');
      document.getElementById('inspector').textContent = JSON.stringify(data, null, 2);
      toast('Error at step ' + (stepIdx + 1));
      setScannerActive(false);
      return;
    }

    setCardState(stepIdx, 'done');
    completedSteps.push(data);
    clickAgent(stepIdx);

    if (data.next_gate) {
      setCardState(stepIdx + 1, 'gate');
      runState = 'paused_at_gate';
      document.getElementById('approve').style.display = '';
      document.getElementById('step').style.display = 'none';
      toast('Gate: ' + data.next_gate.agent_name + ' requires approval');
      setScannerActive(false);
    } else if (stepIdx + 1 < 12) {
      document.getElementById('step').style.display = '';
      document.getElementById('approve').style.display = 'none';
      runState = 'ready';
      setTimeout(runStep, 300);
    } else {
      runState = 'completed';
      document.getElementById('step').style.display = 'none';
      setScannerActive(false);
      toast('Pipeline complete!');
    }
    updateSys();
  } catch (e) {
    clearInterval(iv);
    setCardState(stepIdx, 'error');
    setScannerActive(false);
    toast('Step failed: ' + e.message);
  }
}

// ── Approve gate ──
document.getElementById('approve').onclick = async () => {
  try {
    const resp = await fetch(API + '/pipeline/' + runId + '/approve', {method: 'POST'});
    const data = await resp.json();
    if (data.approved) {
      const gateIdx = completedSteps.length;
      setCardState(gateIdx, 'locked');
      document.getElementById('approve').style.display = 'none';
      toast('Gate approved \u2014 continuing');
      await runStep();
    }
  } catch (e) { toast('Approve failed: ' + e.message); }
};

document.getElementById('step').onclick = runStep;

// ── Document Library ──
let allDocs = [];
let viewedDoc = null;

function docIcon(type, name) {
  if ((type||'').includes('pdf') || (name||'').endsWith('.pdf')) return '\u{1F4C4}';
  if ((type||'').includes('image')) return '\u{1F5BC}';
  if ((type||'').includes('text') || (name||'').match(/\.(txt|md|csv)$/)) return '\u{1F4DD}';
  return '\u{1F4CE}';
}

function renderDocLibrary() {
  const lib = document.getElementById('doc-library');
  const sel = document.getElementById('doc-select');
  sel.innerHTML = '<option value="">-- Select document --</option>';

  if (!allDocs.length) {
    lib.innerHTML = '<div style="font-size:12px;color:var(--dim);padding:8px">No documents yet. Upload or paste a link.</div>';
    return;
  }

  lib.innerHTML = allDocs.map(d => {
    const icon = docIcon(d.type, d.filename);
    const isPdf = (d.type||'').includes('pdf');
    const isText = (d.type||'').includes('text');
    return '<div class="doc-item" onclick="selectDoc(\'' + d.doc_id + '\')">' +
      '<span style="font-size:16px;margin-top:2px">' + icon + '</span>' +
      '<div style="flex:1;min-width:0">' +
        '<div style="font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(d.filename) + '</div>' +
        '<div style="display:flex;align-items:center;gap:8px;margin-top:2px;font-size:10px;color:var(--dim)">' +
          '<span>' + formatSize(d.size) + '</span>' +
          (d.sv_id ? '<span style="background:rgba(74,143,232,0.12);color:var(--blue);padding:1px 4px;border-radius:3px">' + d.sv_id + '</span>' : '') +
          (isPdf ? '<span style="color:var(--red)">PDF</span>' : '') +
          (isText ? '<span style="color:var(--green)">TXT</span>' : '') +
        '</div>' +
        '<div style="font-size:10px;color:var(--dim);margin-top:2px">' + formatDate(d.uploaded_at) + '</div>' +
      '</div>' +
      '<button onclick="event.stopPropagation();loadDocToPipeline(\'' + d.doc_id + '\')" style="font-size:10px;background:rgba(74,143,232,0.15);color:var(--blue);padding:2px 6px;border-radius:3px;min-height:24px;opacity:0;transition:opacity .15s" onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0" title="Load into pipeline">\u25B6</button>' +
    '</div>';
  }).join('');

  allDocs.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.doc_id;
    opt.textContent = d.filename + ' (' + formatSize(d.size) + ')' + (d.sv_id ? ' \u00b7 ' + d.sv_id : '');
    sel.appendChild(opt);
  });
}

async function loadDocs() {
  try {
    const resp = await fetch(API + '/doc/list');
    const data = await resp.json();
    allDocs = data.documents || [];
    renderDocLibrary();
  } catch(e) { console.log('doc list unavailable'); }
}

async function selectDoc(docId) {
  viewedDoc = allDocs.find(d => d.doc_id === docId);
  if (!viewedDoc) return;

  const viewer = document.getElementById('doc-viewer');
  const title = document.getElementById('viewer-title');
  const content = document.getElementById('viewer-content');

  title.textContent = viewedDoc.filename;
  viewer.classList.add('open');

  const isPdf = (viewedDoc.type||'').includes('pdf');
  const isImage = (viewedDoc.type||'').includes('image');
  const isText = (viewedDoc.type||'').includes('text');

  if (isPdf) {
    content.innerHTML =
      '<div style="font-size:12px;color:var(--dim);margin-bottom:8px">PDF \u00b7 ' + formatSize(viewedDoc.size) + '</div>' +
      '<object data="' + API + '/doc/' + docId + '" type="application/pdf" style="width:100%;height:250px;border-radius:8px">' +
        '<div style="font-size:12px;color:var(--dim);padding:16px;background:rgba(0,0,0,.4);border-radius:8px">PDF preview unavailable. <a href="' + API + '/doc/' + docId + '" target="_blank" style="color:var(--blue)">Open in new tab</a></div>' +
      '</object>' +
      '<button onclick="loadDocToPipeline(\'' + docId + '\')" style="margin-top:8px;width:100%;font-size:12px;background:rgba(74,143,232,0.15);color:var(--blue);padding:8px;border-radius:6px">Load into Pipeline \u25B6</button>';
  } else if (isImage) {
    content.innerHTML =
      '<img src="' + API + '/doc/' + docId + '" style="width:100%;border-radius:8px;max-height:250px;object-fit:contain"/>' +
      '<button onclick="loadDocToPipeline(\'' + docId + '\')" style="margin-top:8px;width:100%;font-size:12px;background:rgba(74,143,232,0.15);color:var(--blue);padding:8px;border-radius:6px">Load into Pipeline \u25B6</button>';
  } else if (isText) {
    try {
      const r = await fetch(API + '/doc/' + docId);
      const text = await r.text();
      content.innerHTML =
        '<pre style="font-size:11px;color:var(--mid);background:rgba(0,0,0,.4);padding:8px;border-radius:8px;max-height:200px;overflow:auto;white-space:pre-wrap">' + escHtml(text.slice(0, 3000)) + (text.length > 3000 ? '\n\n[...truncated]' : '') + '</pre>' +
        '<button onclick="loadDocToPipeline(\'' + docId + '\')" style="margin-top:8px;width:100%;font-size:12px;background:rgba(74,143,232,0.15);color:var(--blue);padding:8px;border-radius:6px">Load into Pipeline \u25B6</button>';
    } catch(e) { content.innerHTML = '<div style="font-size:12px;color:var(--red)">Failed to load</div>'; }
  } else {
    content.innerHTML =
      '<div style="font-size:12px;color:var(--dim);padding:8px">Unknown type: ' + viewedDoc.type + '</div>' +
      '<a href="' + API + '/doc/' + docId + '" target="_blank" style="font-size:12px;color:var(--blue)">Download</a>';
  }
}

function closeViewer() {
  document.getElementById('doc-viewer').classList.remove('open');
  viewedDoc = null;
}

function openDocNewTab() {
  if (viewedDoc) window.open(API + '/doc/' + viewedDoc.doc_id, '_blank');
}

async function analyzeViewedDoc() {
  if (!viewedDoc) return;
  toast('Starting analysis...');
  try {
    const resp = await fetch(API + '/doc/' + viewedDoc.doc_id + '/analyze', {method:'POST'});
    const data = await resp.json();
    if (data.run_id) {
      runId = data.run_id;
      toast('Pipeline started from document');
    } else {
      toast('Analysis failed: ' + (data.error || '?'));
    }
  } catch(e) { toast('Error: ' + e.message); }
}

async function loadDocToPipeline(docId) {
  try {
    const resp = await fetch(API + '/doc/' + docId);
    const type = resp.headers.get('Content-Type') || '';
    if (type.includes('text') || type.includes('json')) {
      document.getElementById('doc-text').value = await resp.text();
      toast('Loaded into pipeline');
    } else {
      toast('Binary file \u2014 use Analyze button instead');
    }
  } catch(e) { toast('Failed: ' + e.message); }
}

document.getElementById('doc-select').onchange = function() {
  if (this.value) loadDocToPipeline(this.value);
};

// ── File upload (proper FormData POST) ──
async function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const text = await file.text();
  document.getElementById('doc-text').value = text;
  toast('Loaded: ' + file.name);
}

async function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  toast('Uploading ' + file.name + '...');
  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch(API + '/doc/upload', {method:'POST', body:fd});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    toast('Uploaded: ' + (d.filename || file.name));
    loadDocs();
  } catch(e) { toast('Upload failed: ' + e.message); }
}

// ── Health check ──
async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    const d = await r.json();
    const keys = [d.anthropic && 'Anthropic', d.gemini && 'Gemini', d.openrouter && 'OpenRouter'].filter(Boolean);
    document.getElementById('health-status').innerHTML =
      '<span class="health-dot" style="background:var(--green)"></span> Online' +
      '<div style="color:var(--dim);margin-top:4px">Keys: ' + (keys.join(', ') || 'none') + '</div>' +
      '<div style="color:var(--dim)">Sheet: ' + d.sheet_state + '</div>';
  } catch(e) {
    document.getElementById('health-status').innerHTML = '<span class="health-dot" style="background:var(--red)"></span> Offline';
  }
}

// ── Load agents from backend (fallback to hardcoded) ──
async function loadAgents() {
  try {
    const r = await fetch(API + '/agents');
    const d = await r.json();
    if (d.agents && d.agents.length) {
      AGENTS = d.agents.map(a => ({id: a.id, t: a.name_he, gate: a.requires_human}));
    }
  } catch(e) { console.log('agents endpoint unavailable, using fallback'); }
}

// ── Run reconnect: check for incomplete runs on load ──
async function checkForActiveRuns() {
  try {
    const r = await fetch(API + '/pipeline/runs');
    const d = await r.json();
    const runs = d.runs || [];
    const incomplete = runs.find(run => run.status === 'running' || run.status === 'paused_at_gate');
    if (incomplete) {
      resumeRunId = incomplete.run_id;
      document.getElementById('resume-text').textContent = 'Active run found: ' + incomplete.run_id + ' \u2014 Resume?';
      document.getElementById('resume-banner').classList.add('visible');
    }
  } catch(e) { /* no active runs endpoint or no runs */ }
}

async function resumeRun() {
  if (!resumeRunId) return;
  runId = resumeRunId;
  runState = 'pending';
  document.getElementById('resume-banner').classList.remove('visible');
  toast('Resuming run: ' + runId);
  // Try to get current state
  try {
    const r = await fetch(API + '/pipeline/' + runId + '/status');
    const d = await r.json();
    if (d.completed_steps) {
      completedSteps = d.completed_steps;
      completedSteps.forEach((_, i) => setCardState(i, 'done'));
    }
    if (d.status === 'paused_at_gate') {
      runState = 'paused_at_gate';
      const gateIdx = completedSteps.length;
      setCardState(gateIdx, 'gate');
      document.getElementById('approve').style.display = '';
    } else {
      await runStep();
    }
    updateSys();
  } catch(e) {
    // Just try to advance
    await runStep();
  }
}

function dismissResume() {
  resumeRunId = null;
  document.getElementById('resume-banner').classList.remove('visible');
}

// ── Init ──
loadAgents();
checkHealth();
loadDocs();
checkForActiveRuns();
