<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solvulator Pilot – Live Pipeline</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{font-family:system-ui,-apple-system,"SF Pro"}
  .glass{backdrop-filter:blur(12px);background:rgba(255,255,255,.05)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f2937;padding:12px 22px;border-radius:12px;opacity:0;transition:.3s;pointer-events:none;z-index:100}
  .toast.show{opacity:1}
  pre{white-space:pre-wrap;word-break:break-word}
  .doc-input{width:100%;background:rgba(0,0,0,.3);border:1px solid #374151;border-radius:8px;padding:8px;color:#fff;font-size:12px;resize:vertical;min-height:80px;font-family:inherit}
  .doc-input:focus{border-color:#3b82f6;outline:none}
  .gate-badge{display:inline-block;background:#92400e;color:#fbbf24;font-size:10px;padding:1px 6px;border-radius:4px;margin-right:4px}
  .nav-link{color:#9ca3af;text-decoration:none;font-size:12px}
  .nav-link:hover{color:#fff}
</style>
</head>
<body class="bg-[#0B0F14] text-white min-h-screen flex">
<aside class="w-72 bg-[#11161C] flex flex-col h-screen overflow-hidden">
  <div class="p-4 border-b border-gray-800">
    <h1 class="text-lg font-bold">Solvulator</h1>
    <div class="flex gap-2 mt-2 text-xs">
      <a href="/" class="px-2 py-1 rounded bg-[#1C2330] hover:bg-[#2C3340]">Storyboard</a>
      <span class="px-2 py-1 rounded bg-blue-900/40 text-blue-300">Pipeline</span>
      <a href="/check.html" class="px-2 py-1 rounded bg-[#1C2330] hover:bg-[#2C3340]">Check</a>
    </div>
  </div>

  <!-- Document Library -->
  <div class="flex-1 overflow-y-auto p-3">
    <div class="flex justify-between items-center mb-2">
      <h2 class="text-xs font-bold text-gray-400 tracking-wider">DOCUMENTS</h2>
      <label class="text-[10px] bg-blue-900/30 text-blue-300 px-2 py-0.5 rounded cursor-pointer hover:bg-blue-900/50">
        + Upload
        <input type="file" accept=".pdf,.txt,.doc,.docx,.jpg,.png" class="hidden" onchange="handleFileUpload(this)"/>
      </label>
    </div>
    <div id="doc-library" class="space-y-1.5">
      <div class="text-xs text-gray-600 p-2">Loading...</div>
    </div>
  </div>

  <!-- Viewer panel (slides up when doc selected) -->
  <div id="doc-viewer" class="border-t border-gray-800 bg-[#0D1117] max-h-[40vh] overflow-y-auto hidden">
    <div class="flex justify-between items-center p-3 sticky top-0 bg-[#0D1117] z-10">
      <h3 id="viewer-title" class="text-xs font-bold text-gray-300 truncate"></h3>
      <div class="flex gap-1.5">
        <button onclick="analyzeViewedDoc()" class="text-[10px] bg-emerald-900/30 text-emerald-300 px-2 py-0.5 rounded hover:bg-emerald-900/50">Analyze</button>
        <button onclick="openDocNewTab()" class="text-[10px] bg-gray-700 text-gray-300 px-2 py-0.5 rounded hover:bg-gray-600">Open ↗</button>
        <button onclick="closeViewer()" class="text-[10px] text-gray-500 hover:text-white px-1">✕</button>
      </div>
    </div>
    <div id="viewer-content" class="px-3 pb-3"></div>
  </div>

  <div class="p-3 border-t border-gray-800 text-xs text-gray-600">
    <div id="health-status">Checking...</div>
  </div>
</aside>

<main class="flex-1 p-6 overflow-auto">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-semibold">Pipeline Runner</h2>
    <div class="flex gap-2">
      <select id="doc-select" class="bg-[#1C2330] text-sm rounded-lg px-3 py-2 border border-gray-700">
        <option value="">-- Select document --</option>
      </select>
      <button id="start" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-xl text-sm">Start Pipeline</button>
      <button id="step" class="bg-emerald-700 hover:bg-emerald-600 px-4 py-2 rounded-xl text-sm hidden">Next Step →</button>
      <button id="approve" class="bg-amber-700 hover:bg-amber-600 px-4 py-2 rounded-xl text-sm hidden">Approve Gate</button>
    </div>
  </div>

  <!-- Document input -->
  <div id="doc-panel" class="glass p-4 rounded-2xl mb-4">
    <div class="flex justify-between items-center mb-2">
      <h3 class="font-bold text-sm">Document Text</h3>
      <div class="flex gap-2">
        <label class="bg-[#1C2330] text-xs px-3 py-1.5 rounded-lg cursor-pointer hover:bg-[#2C3340]">
          Upload PDF/TXT
          <input type="file" accept=".pdf,.txt,.doc,.docx" class="hidden" onchange="handleFile(this)"/>
        </label>
      </div>
    </div>
    <textarea id="doc-text" class="doc-input" rows="4" placeholder="Paste document text here, upload a file, or select from dropdown..."></textarea>
  </div>

  <!-- Pipeline cards -->
  <div id="pipeline" class="flex gap-2 overflow-x-auto pb-4 mb-4"></div>

  <!-- Inspector -->
  <div class="grid grid-cols-3 gap-4">
    <div class="col-span-2 glass p-4 rounded-2xl">
      <div class="flex justify-between items-center mb-2">
        <h3 id="inspector-title" class="font-bold">Select an agent</h3>
        <span id="inspector-ms" class="text-xs text-gray-500"></span>
      </div>
      <pre id="inspector" class="text-xs bg-black/40 p-3 rounded-lg max-h-[400px] overflow-auto text-gray-300">Click "Start Pipeline" to begin</pre>
    </div>
    <div class="glass p-4 rounded-2xl">
      <h3 class="font-bold mb-3">Run Status</h3>
      <div id="sys" class="text-sm text-gray-400 space-y-2">
        <div>Waiting for input</div>
      </div>
    </div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script>
const API = '';
const AGENTS = [
  {id:'01_intake',       t:'קליטה וסיווג',             gate:true},
  {id:'02_ocr',          t:'OCR ושלמות טקסט',           gate:true},
  {id:'03_operative',    t:'חילוץ אופרטיבי',            gate:true},
  {id:'04_structure',    t:'מיפוי מבנה משפטי',          gate:false},
  {id:'05_weakness',     t:'גלאי חולשות',               gate:false},
  {id:'06_foi',          t:'טריגר חופש מידע',            gate:false},
  {id:'07_damage',       t:'מחשבון חשיפת נזקים',        gate:false},
  {id:'08_strategy',     t:'בניית אסטרטגיה',            gate:true},
  {id:'09_draft',        t:'יצירת טיוטה',               gate:true},
  {id:'10_verify',       t:'שער אימות אנושי',           gate:true},
  {id:'11_filing',       t:'שליחה ותיעוד',              gate:false},
  {id:'12_meta',         t:'רישום דפוסים מערכתיים',     gate:false},
];

let runId = null;
let runState = null;
let completedSteps = [];

// Build pipeline cards
const pipeline = document.getElementById('pipeline');
AGENTS.forEach((a, i) => {
  const c = document.createElement('div');
  c.className = 'min-w-[170px] glass p-3 rounded-xl border border-gray-700/50 opacity-40 cursor-pointer transition-all';
  c.innerHTML = `
    <div class="text-[10px] text-gray-500 flex items-center gap-1">
      Agent ${String(i+1).padStart(2,'0')}
      ${a.gate ? '<span class="gate-badge">GATE</span>' : ''}
    </div>
    <div class="font-bold text-[13px] mt-1">${a.t}</div>
    <div id="st-${i}" class="mt-2 text-xs text-gray-500">locked</div>
    <div id="pg-${i}" class="w-full h-1 bg-gray-700 rounded mt-1.5 hidden">
      <div class="bg-blue-500 h-1 rounded transition-all" style="width:0%"></div>
    </div>`;
  c.onclick = () => clickAgent(i);
  pipeline.appendChild(c);
  if (i < AGENTS.length - 1) {
    const arr = document.createElement('div');
    arr.className = 'self-center text-gray-700 text-xs';
    arr.textContent = '→';
    pipeline.appendChild(arr);
  }
});

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function setCardState(i, state, pct = 0) {
  const card = pipeline.children[i * 2];
  const st = document.getElementById(`st-${i}`);
  const pg = document.getElementById(`pg-${i}`);
  card.classList.remove('opacity-40', 'border-blue-500', 'border-green-500', 'border-amber-500', 'border-red-500');

  if (state === 'running') {
    card.classList.add('border-blue-500');
    st.innerHTML = `<span class="text-blue-400">running… ${pct}%</span>`;
    pg.classList.remove('hidden');
    pg.firstElementChild.style.width = pct + '%';
  } else if (state === 'done') {
    card.classList.add('border-green-500');
    st.innerHTML = '<span class="text-green-400">done</span>';
    pg.classList.add('hidden');
  } else if (state === 'gate') {
    card.classList.add('border-amber-500');
    st.innerHTML = '<span class="text-amber-400">awaiting approval</span>';
    pg.classList.add('hidden');
  } else if (state === 'error') {
    card.classList.add('border-red-500');
    st.innerHTML = '<span class="text-red-400">error</span>';
    pg.classList.add('hidden');
  } else {
    card.classList.add('opacity-40');
    st.textContent = 'locked';
    pg.classList.add('hidden');
  }
}

function clickAgent(i) {
  if (i >= completedSteps.length) {
    if (!(runState === 'paused_at_gate' && i === completedSteps.length)) return;
  }
  const step = completedSteps[i];
  if (!step) return;
  document.getElementById('inspector-title').textContent = `Agent ${String(i+1).padStart(2,'0')} – ${AGENTS[i].t}`;
  document.getElementById('inspector-ms').textContent = step.elapsed_ms ? `${step.elapsed_ms}ms` : '';
  document.getElementById('inspector').textContent = JSON.stringify(step.result || step, null, 2);
}

function updateSys() {
  const sys = document.getElementById('sys');
  const parts = [];
  if (runId) parts.push(`<div class="text-xs font-mono text-gray-600">${runId}</div>`);
  parts.push(`<div>Steps: ${completedSteps.length} / 12</div>`);
  if (runState === 'paused_at_gate') {
    parts.push(`<div class="text-amber-400">Waiting: human gate approval</div>`);
  } else if (runState === 'completed') {
    parts.push(`<div class="text-green-400">Pipeline complete</div>`);
  } else if (runState === 'running') {
    parts.push(`<div class="text-blue-400">Running...</div>`);
  }
  sys.innerHTML = parts.join('');
}

// ── Start pipeline ──
document.getElementById('start').onclick = async () => {
  const docText = document.getElementById('doc-text').value.trim();
  if (!docText) { toast('Enter document text first'); return; }

  // Reset
  completedSteps = [];
  runState = 'starting';
  AGENTS.forEach((_, i) => setCardState(i, 'locked'));
  document.getElementById('inspector').textContent = 'Starting pipeline...';
  document.getElementById('step').classList.add('hidden');
  document.getElementById('approve').classList.add('hidden');

  try {
    const resp = await fetch(API + '/pipeline/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({doc_text: docText})
    });
    const data = await resp.json();
    if (data.error) { toast('Error: ' + data.error); return; }
    runId = data.run_id;
    runState = 'pending';
    updateSys();
    toast('Pipeline started: ' + runId);
    // Auto-run first step
    await runStep();
  } catch (e) {
    toast('Failed to start: ' + e.message);
  }
};

// ── Run next step ──
async function runStep() {
  if (!runId) return;
  const stepIdx = completedSteps.length;
  if (stepIdx >= 12) { runState = 'completed'; updateSys(); return; }

  setCardState(stepIdx, 'running', 10);
  runState = 'running';
  updateSys();

  // Animate progress
  let pct = 10;
  const iv = setInterval(() => {
    pct = Math.min(90, pct + Math.random() * 15);
    setCardState(stepIdx, 'running', Math.round(pct));
  }, 500);

  try {
    const resp = await fetch(API + `/pipeline/${runId}/step`, {method: 'POST'});
    clearInterval(iv);
    const data = await resp.json();

    if (data.error) {
      setCardState(stepIdx, 'error');
      document.getElementById('inspector').textContent = JSON.stringify(data, null, 2);
      toast('Error at step ' + (stepIdx + 1));
      return;
    }

    setCardState(stepIdx, 'done');
    completedSteps.push(data);
    clickAgent(stepIdx);

    // Check for gate
    if (data.next_gate) {
      setCardState(stepIdx + 1, 'gate');
      runState = 'paused_at_gate';
      document.getElementById('approve').classList.remove('hidden');
      document.getElementById('step').classList.add('hidden');
      toast(`Gate: ${data.next_gate.agent_name} requires approval`);
    } else if (stepIdx + 1 < 12) {
      // Auto-advance non-gate agents
      document.getElementById('step').classList.remove('hidden');
      document.getElementById('approve').classList.add('hidden');
      runState = 'ready';
      // Auto-run next step after brief pause
      setTimeout(runStep, 300);
    } else {
      runState = 'completed';
      document.getElementById('step').classList.add('hidden');
      toast('Pipeline complete!');
    }
    updateSys();
  } catch (e) {
    clearInterval(iv);
    setCardState(stepIdx, 'error');
    toast('Step failed: ' + e.message);
  }
}

// ── Approve gate ──
document.getElementById('approve').onclick = async () => {
  try {
    const resp = await fetch(API + `/pipeline/${runId}/approve`, {method: 'POST'});
    const data = await resp.json();
    if (data.approved) {
      const gateIdx = completedSteps.length;
      setCardState(gateIdx, 'locked'); // Reset gate card
      document.getElementById('approve').classList.add('hidden');
      toast('Gate approved — continuing');
      await runStep();
    }
  } catch (e) { toast('Approve failed: ' + e.message); }
};

document.getElementById('step').onclick = runStep;

// ── Document Library ──
let allDocs = [];
let viewedDoc = null;

function docIcon(type, name) {
  if ((type||'').includes('pdf') || (name||'').endsWith('.pdf')) return '📄';
  if ((type||'').includes('image')) return '🖼';
  if ((type||'').includes('text') || (name||'').match(/\.(txt|md|csv)$/)) return '📝';
  return '📎';
}

function formatSize(b) {
  if (b > 1048576) return (b/1048576).toFixed(1) + 'MB';
  if (b > 1024) return (b/1024).toFixed(0) + 'KB';
  return b + 'B';
}

function formatDate(iso) {
  if (!iso) return '';
  return iso.replace('T',' ').replace(/:\d{2}Z$/,'');
}

function renderDocLibrary() {
  const lib = document.getElementById('doc-library');
  const sel = document.getElementById('doc-select');
  sel.innerHTML = '<option value="">-- Select document --</option>';

  if (!allDocs.length) {
    lib.innerHTML = '<div class="text-xs text-gray-600 p-2">No documents yet. Upload or paste a link.</div>';
    return;
  }

  lib.innerHTML = allDocs.map(d => {
    const icon = docIcon(d.type, d.filename);
    const isPdf = (d.type||'').includes('pdf');
    const isText = (d.type||'').includes('text');
    return `
    <div class="group p-2 rounded-lg hover:bg-[#1C2330] cursor-pointer transition-all border border-transparent hover:border-gray-700"
         onclick="selectDoc('${d.doc_id}')">
      <div class="flex items-start gap-2">
        <span class="text-lg mt-0.5">${icon}</span>
        <div class="flex-1 min-w-0">
          <div class="text-xs font-medium text-gray-200 truncate">${d.filename}</div>
          <div class="flex items-center gap-2 mt-0.5 text-[10px] text-gray-500">
            <span>${formatSize(d.size)}</span>
            ${d.sv_id ? `<span class="bg-blue-900/30 text-blue-300 px-1 rounded">${d.sv_id}</span>` : ''}
            ${isPdf ? '<span class="text-red-400">PDF</span>' : ''}
            ${isText ? '<span class="text-green-400">TXT</span>' : ''}
          </div>
          <div class="text-[10px] text-gray-600 mt-0.5">${formatDate(d.uploaded_at)}</div>
        </div>
        <div class="opacity-0 group-hover:opacity-100 flex gap-1 transition-opacity">
          <button onclick="event.stopPropagation();loadDocToPipeline('${d.doc_id}')" class="text-[10px] bg-blue-900/40 text-blue-300 px-1.5 py-0.5 rounded" title="Load into pipeline">▶</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Also populate the dropdown
  allDocs.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.doc_id;
    opt.textContent = `${d.filename} (${formatSize(d.size)}) ${d.sv_id ? '· '+d.sv_id : ''}`;
    sel.appendChild(opt);
  });
}

async function loadDocs() {
  try {
    const resp = await fetch(API + '/doc/list');
    const data = await resp.json();
    allDocs = data.documents || [];
    renderDocLibrary();
  } catch(e) { console.log('doc list unavailable'); }
}

async function selectDoc(docId) {
  viewedDoc = allDocs.find(d => d.doc_id === docId);
  if (!viewedDoc) return;

  const viewer = document.getElementById('doc-viewer');
  const title = document.getElementById('viewer-title');
  const content = document.getElementById('viewer-content');

  title.textContent = viewedDoc.filename;
  viewer.classList.remove('hidden');

  const isPdf = (viewedDoc.type||'').includes('pdf');
  const isImage = (viewedDoc.type||'').includes('image');
  const isText = (viewedDoc.type||'').includes('text');

  if (isPdf) {
    content.innerHTML = `
      <div class="text-xs text-gray-400 mb-2">PDF · ${formatSize(viewedDoc.size)}</div>
      <object data="${API}/doc/${docId}" type="application/pdf" class="w-full rounded" style="height:250px">
        <div class="text-xs text-gray-500 p-4 bg-black/40 rounded">
          PDF preview unavailable.
          <a href="${API}/doc/${docId}" target="_blank" class="text-blue-400 underline">Open in new tab</a>
        </div>
      </object>
      <button onclick="loadDocToPipeline('${docId}')" class="mt-2 w-full text-xs bg-blue-900/40 text-blue-300 py-2 rounded hover:bg-blue-900/60">
        Load into Pipeline ▶
      </button>`;
  } else if (isImage) {
    content.innerHTML = `
      <img src="${API}/doc/${docId}" class="w-full rounded" style="max-height:250px;object-fit:contain"/>
      <button onclick="loadDocToPipeline('${docId}')" class="mt-2 w-full text-xs bg-blue-900/40 text-blue-300 py-2 rounded hover:bg-blue-900/60">
        Load into Pipeline ▶
      </button>`;
  } else if (isText) {
    try {
      const r = await fetch(API + '/doc/' + docId);
      const text = await r.text();
      content.innerHTML = `
        <pre class="text-[11px] text-gray-300 bg-black/40 p-2 rounded max-h-[200px] overflow-auto whitespace-pre-wrap">${escHtml(text.slice(0, 3000))}${text.length > 3000 ? '\n\n[...truncated]' : ''}</pre>
        <button onclick="loadDocToPipeline('${docId}')" class="mt-2 w-full text-xs bg-blue-900/40 text-blue-300 py-2 rounded hover:bg-blue-900/60">
          Load into Pipeline ▶
        </button>`;
    } catch(e) { content.innerHTML = '<div class="text-xs text-red-400">Failed to load</div>'; }
  } else {
    content.innerHTML = `
      <div class="text-xs text-gray-500 p-2">Unknown type: ${viewedDoc.type}</div>
      <a href="${API}/doc/${docId}" target="_blank" class="text-xs text-blue-400 underline">Download</a>`;
  }
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function closeViewer() {
  document.getElementById('doc-viewer').classList.add('hidden');
  viewedDoc = null;
}

function openDocNewTab() {
  if (viewedDoc) window.open(API + '/doc/' + viewedDoc.doc_id, '_blank');
}

async function analyzeViewedDoc() {
  if (!viewedDoc) return;
  toast('Starting analysis...');
  try {
    const resp = await fetch(API + '/doc/' + viewedDoc.doc_id + '/analyze', {method:'POST'});
    const data = await resp.json();
    if (data.run_id) {
      runId = data.run_id;
      toast('Pipeline started from document');
    } else {
      toast('Analysis failed: ' + (data.error || '?'));
    }
  } catch(e) { toast('Error: ' + e.message); }
}

async function loadDocToPipeline(docId) {
  try {
    const resp = await fetch(API + '/doc/' + docId);
    const type = resp.headers.get('Content-Type') || '';
    if (type.includes('text') || type.includes('json')) {
      document.getElementById('doc-text').value = await resp.text();
      toast('Loaded into pipeline');
    } else {
      toast('Binary file — use Analyze button instead');
    }
  } catch(e) { toast('Failed: ' + e.message); }
}

document.getElementById('doc-select').onchange = function() {
  if (this.value) loadDocToPipeline(this.value);
};

// ── File upload ──
async function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const text = await file.text();
  document.getElementById('doc-text').value = text;
  toast('Loaded: ' + file.name);
}

async function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  toast('Uploading ' + file.name + '...');
  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch(API + '/doc/upload', {method:'POST', body:fd});
    const d = await r.json();
    toast('Uploaded: ' + (d.filename || file.name));
    loadDocs(); // refresh library
  } catch(e) { toast('Upload failed: ' + e.message); }
}

// ── Health check ──
async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    const d = await r.json();
    const keys = [d.anthropic && 'Anthropic', d.gemini && 'Gemini', d.openrouter && 'OpenRouter'].filter(Boolean);
    document.getElementById('health-status').innerHTML =
      `<div class="text-green-500">● Online</div>` +
      `<div class="text-gray-500 mt-1">Keys: ${keys.join(', ') || 'none'}</div>` +
      `<div class="text-gray-500">Sheet: ${d.sheet_state}</div>`;
  } catch(e) {
    document.getElementById('health-status').innerHTML = '<div class="text-red-500">● Offline</div>';
  }
}

// ── Init ──
checkHealth();
loadDocs();

// Pre-fill with sample Hebrew legal text
