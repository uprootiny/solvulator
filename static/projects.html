<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Projects — Legal & Operations Stack</title>
<style>
:root{--bg:#08080a;--card:#0e0e11;--border:#1a1a1e;--text:#c8c4b8;--dim:#555;--mute:#333;
  --gold:#c9a227;--green:#3a8a3a;--red:#a03030;--blue:#3a6aaa;--mono:'Courier New',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;
     min-height:100vh;padding:20px}
h1{font-size:14px;color:var(--gold);letter-spacing:4px;text-transform:uppercase;margin-bottom:4px}
.sub{font-size:9px;color:var(--dim);letter-spacing:2px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{border:1px solid var(--border);background:var(--card);border-radius:3px;
      padding:14px 16px;transition:all 0.15s;position:relative;overflow:hidden;
      text-decoration:none;display:block;cursor:pointer}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;
              transition:opacity 0.15s;opacity:0}
.card:hover{border-color:#2a2a30;transform:translateY(-1px)}
.card:hover::before{opacity:1}
.card.up::before{background:var(--green)}
.card.down::before{background:var(--red)}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.up{background:var(--green);box-shadow:0 0 6px rgba(60,140,60,0.5)}
.dot.down{background:var(--red)}
.card-name{font-size:12px;color:var(--gold);font-weight:600;letter-spacing:1px}
.card-port{font-size:9px;color:var(--dim);margin-left:auto}
.card-desc{font-size:10px;color:#888;line-height:1.5;margin-bottom:6px}
.card-path{font-size:8px;color:var(--mute);word-break:break-all}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.tag{font-size:7px;padding:1px 5px;border:1px solid var(--border);border-radius:1px;
     letter-spacing:0.5px;color:var(--dim)}
.tag.legal{color:#a08030;border-color:#4a3a10}
.tag.agent{color:var(--blue);border-color:#1a2a4a}
.tag.ui{color:#8a5a9a;border-color:#2a1a3a}
.tag.api{color:var(--green);border-color:#1a3a1a}
.tag.game{color:#aa5a30;border-color:#3a1a0a}
.stats{margin-top:20px;font-size:10px;color:var(--dim);display:flex;gap:16px}
.stats span{color:var(--gold)}
#refresh{position:fixed;top:12px;right:16px;font-size:9px;color:var(--dim);cursor:pointer;
         border:1px solid var(--border);padding:3px 8px;border-radius:2px}
#refresh:hover{color:var(--gold);border-color:var(--gold)}
</style>
</head>
<body>
<h1>PROJECT DIRECTORY</h1>
<div class="sub">Legal & Operations Stack — all surfaces</div>
<div class="grid" id="grid"></div>
<div class="stats" id="stats"></div>
<div id="refresh" onclick="load()">refresh</div>
<script>
const H=location.hostname;
const PROJECTS=[
  {name:'Solvulator',desc:'12-agent legal doc processor — LATHE, Claude, tokens, sheets',port:9801,
   path:'/metaops/solvulator/',tags:['legal','agent','api'],url:'/'},
  {name:'Solvulator Pipeline',desc:'Document upload + pipeline viewer (Hebrew RTL)',port:11115,
   path:'/metaops/solvulator/',tags:['legal','ui'],url:'/'},
  {name:'Legal Warroom',desc:'Real-time legal research & task collaboration (ClojureScript)',port:7117,
   path:'/March2026/legal-warroom/',tags:['legal','ui'],url:'/'},
  {name:'Legal Casework',desc:'Full legal case management workbench (Shadow-CLJS)',port:8340,
   path:'/March2026/legalcasework/',tags:['legal','ui'],url:'/'},
  {name:'Disparch',desc:'67-node CYOA agent dispatcher — shell, bb, Claude, HTTP agents',port:4444,
   path:'/March2026/terminalto/',tags:['agent','ui'],url:'/'},
  {name:'War Room',desc:'Operational dashboard — 52 docs, 9 services, agenslack, coggy runs',port:11113,
   path:'/metaops/martial/ops/',tags:['ui','api'],url:'/'},
  {name:'Martial Viewer',desc:'63-route platform — sessions, surfaces, epistemic cycle, APIs',port:35617,
   path:'/metaops/martial/',tags:['ui','api'],url:'/'},
  {name:'Epistemic Cycle',desc:'Wu Xing corruption/repair tool with image paste',port:35617,
   path:'/metaops/martial/',tags:['game','ui'],url:'/epistemic/cycle'},
  {name:'Motorsaz',desc:'Epistemic audit game — 12 scenarios, pentagram nav, bilingual',port:11114,
   path:'/metaops/motorsaz/',tags:['game','legal'],url:'/'},
  {name:'Glock',desc:'Interactive workbench UI (87KB single-file)',port:8348,
   path:'/March2026/glock/',tags:['ui'],url:'/'},
  {name:'Inbox',desc:'Drop screenshots from any device for processing',port:11112,
   path:'/metaops/martial/ops/',tags:['ui'],url:'/'},
  {name:'Fulcrum',desc:'Parametric infinity mirror WebGL shader with per-axis rerolls',port:11111,
   path:'/metaops/martial/',tags:['ui','game'],url:'/'},
  {name:'Raindesk',desc:'Portfolio dashboard',port:8350,
   path:'/March2026/raindesk/',tags:['ui'],url:'/'},
  {name:'Free Stack',desc:'Technology stack documentation & validation',port:8351,
   path:'/March2026/free-stack/',tags:['ui'],url:'/'},
  {name:'Auspice',desc:'Interactive storyboard & agent documentation',port:8352,
   path:'/March2026/auspice/',tags:['ui','agent'],url:'/'},
];

async function load(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  let up=0,down=0;

  const checks=await Promise.allSettled(
    PROJECTS.map(p=>
      fetch(`http://${H}:${p.port}${p.url}`,{mode:'no-cors',signal:AbortSignal.timeout(3000)})
        .then(()=>true).catch(()=>false)
    )
  );

  PROJECTS.forEach((p,i)=>{
    const alive=checks[i].status==='fulfilled'?checks[i].value:false;
    // no-cors always succeeds if server responds, so check fulfilled
    const isUp=checks[i].status==='fulfilled';
    if(isUp) up++; else down++;

    const card=document.createElement('a');
    card.className=`card ${isUp?'up':'down'}`;
    card.href=`http://${H}:${p.port}${p.url}`;
    card.target='_blank';
    card.innerHTML=`
      <div class="card-top">
        <span class="dot ${isUp?'up':'down'}"></span>
        <span class="card-name">${p.name}</span>
        <span class="card-port">:${p.port}</span>
      </div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-path">${p.path}</div>
      <div class="card-tags">${p.tags.map(t=>`<span class="tag ${t}">${t}</span>`).join('')}</div>
    `;
    grid.appendChild(card);
  });

  document.getElementById('stats').innerHTML=
    `<span>${up}</span> up · <span>${down}</span> down · <span>${PROJECTS.length}</span> total · ${new Date().toLocaleTimeString()}`;
}

load();
setInterval(load,30000);
</script>
</body>
</html>
